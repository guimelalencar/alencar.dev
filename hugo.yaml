# Hugo configuration file 
title: alencar.dev

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Contact ↗
      url: "https://github.com/GuimelAlencar"
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/GuimelAlencar"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
  
  footer:
    displayCopyright: false
    displayPoweredBy: true
  
  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
  
  # Configuração do sistema de comentários
  comments:
    enable: true
    type: giscus
    
    giscus:
      repo: "GuimelAlencar/my_blog"
      repoId: "R_kgDORAbbWQ"
      category: "Blog Posts"
      categoryId: "DIC_kwDORAbbWc4C1X_t"
